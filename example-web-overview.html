<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viktor Vitovec | Web Portfolio</title>
  <meta name="description" content="Přehled webových stránek, které jsem vytvořil pro restaurace, kavárny, firmy a podnikatele." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ─────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(56, 99, 220, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139, 92, 246, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(14, 165, 233, 0.06) 0%, transparent 60%);
    }

    /* ── Header / Hero ───────────────────────────────── */
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
      max-width: 800px;
      margin: 0 auto;
    }
    .hero-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.25);
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 1.1rem;
      color: #94a3b8;
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── Filter Tags ─────────────────────────────────── */
    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 24px 48px;
      max-width: 800px;
      margin: 0 auto;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: 100px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(255, 255, 255, 0.04);
      color: #94a3b8;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .filter-btn:hover {
      background: rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.35);
      color: #c7d2fe;
    }
    .filter-btn.active {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.5);
      color: #e0e7ff;
    }

    /* ── Grid ─────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      padding: 0 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px)  { .grid { grid-template-columns: 1fr; padding: 0 20px 60px; gap: 24px; } }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      position: relative;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(.22,.61,.36,1), box-shadow 0.4s ease, border-color 0.4s ease;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35), 0 0 40px rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.25);
    }

    /* Iframe preview container */
    .card-preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: #111827;
    }
    .card-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      /* Transparent overlay prevents accidental interaction with the preview */
    }
    .card-preview iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1440px;
      height: 900px;
      border: none;
      transform-origin: top left;
      /* Scale is set via JS based on card width */
    }

    /* Loading state */
    .card-preview .loader {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      transition: opacity 0.5s ease;
    }
    .card-preview .loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card info bar */
    .card-info {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tag {
      flex-shrink: 0;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    /* Card hover action hint */
    .card-action {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 14, 26, 0.6);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .card:hover .card-action { opacity: 1; }
    .card-action span {
      padding: 12px 28px;
      border-radius: 12px;
      background: rgba(99, 102, 241, 0.9);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
      transform: translateY(8px);
      transition: transform 0.35s cubic-bezier(.22,.61,.36,1);
    }
    .card:hover .card-action span { transform: translateY(0); }

    /* ── Fullscreen Modal ─────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .modal-url {
      font-size: 0.78rem;
      color: #64748b;
      margin-left: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .modal-header-left {
      display: flex;
      align-items: center;
      min-width: 0;
      flex: 1;
    }
    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: 16px;
    }
    .modal-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .modal-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .modal-btn-close {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.25);
      color: #fca5a5;
    }
    .modal-btn-close:hover {
      background: rgba(239, 68, 68, 0.25);
    }
    .modal-body {
      flex: 1;
      position: relative;
    }
    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .modal-body .loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      transition: opacity 0.5s ease;
    }
    .modal-body .loader.hidden { opacity: 0; pointer-events: none; }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 40px 24px 48px;
      color: #475569;
      font-size: 0.82rem;
    }
    footer a {
      color: #818cf8;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* ── Animations ────────────────────────────────────── */
    .card {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.6s cubic-bezier(.22,.61,.36,1) forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-badge, .hero h1, .hero p { opacity: 0; animation: fadeUp 0.7s cubic-bezier(.22,.61,.36,1) forwards; }
    .hero-badge { animation-delay: 0.1s; }
    .hero h1   { animation-delay: 0.2s; }
    .hero p    { animation-delay: 0.35s; }

    /* Card stagger delays set via JS */

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
  </style>
</head>
<body>

  <!-- ── Hero Section ───────────────────────────────── -->
  <section class="hero">
    <div class="hero-badge">Portfolio</div>
    <h1>Weby, které tvořím pro své klienty</h1>
    <p>Navrhuji a programuji webové stránky pro restaurace, kavárny, firmy i podnikatele. Každý web je unikátní — podívejte se na ukázky níže.</p>
  </section>

  <!-- ── Filters ────────────────────────────────────── -->
  <div class="filters" id="filters"></div>

  <!-- ── Project Grid ───────────────────────────────── -->
  <div class="grid" id="grid"></div>

  <!-- ── Fullscreen Modal ───────────────────────────── -->
  <div class="modal-overlay" id="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <span class="modal-title" id="modal-title"></span>
        <span class="modal-url" id="modal-url"></span>
      </div>
      <div class="modal-actions">
        <a class="modal-btn" id="modal-open" href="#" target="_blank" rel="noopener">
          ↗ Otevřít web
        </a>
        <button class="modal-btn modal-btn-close" id="modal-close">✕ Zavřít</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="loader" id="modal-loader"><div class="spinner"></div></div>
      <iframe id="modal-iframe" src="about:blank" loading="lazy"></iframe>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer>
    © 2026 Viktor Vitovec &middot; Všechna práva vyhrazena
  </footer>

  <script>
    /* ════════════════════════════════════════════════════
       PROJECT DATA — add new projects here!
       ════════════════════════════════════════════════════ */
    const projects = [
      {
        name: "XinChao",
        url: "https://xinchao.vvitovec27.workers.dev/",
        category: "Restaurace",
        description: "Vietnamská restaurace v Českých Budějovicích"
      },
      {
        name: "Kavárna U Vás",
        url: "https://u-vas.vvitovec27.workers.dev/",
        category: "Kavárna & Čajovna",
        description: "Kavárna a čajovna v centru Českých Budějovic"
      },
      {
        name: "Restaurace U Podkovy",
        url: "https://u-podkovy.vvitovec27.workers.dev/",
        category: "Restaurace",
        description: "Česká restaurace se steaky v Českých Budějovicích"
      },
      {
        name: "ATIRA",
        url: "https://atira-web.vercel.app/",
        category: "Projekce & Development",
        description: "Projekce, inženýring a development"
      },
      {
        name: "Martina Jiříčková",
        url: "https://martina-vyjednavaci-web.vercel.app/",
        category: "Vyjednávání",
        description: "Profesionální vyjednávací služby"
      },
      {
        name: "TISOX",
        url: "https://www.tisox.cz/cs",
        category: "Stavební firma",
        description: "Projektování a realizace staveb"
      },
      {
        name: "EasyFlex",
        url: "https://easyflex.onrender.com/",
        category: "Aplikace",
        description: "Webová aplikace EasyFlex"
      },
      {
        name: "Landing Gen",
        url: "https://landing.vvitovec.com/",
        category: "Aplikace",
        description: "Nástroj pro rychlou tvorbu landing pages"
      },
      {
        name: "Natvian",
        url: "https://natvian.com/",
        category: "E-shop",
        description: "Přírodní veganská kosmetika z Evropy"
      },
      {
        name: "Kavárna Pokoj",
        url: "https://pokoj.vvitovec27.workers.dev/",
        category: "Kavárna & Čajovna",
        description: "Kavárna, která se cítí jako obývák"
      },
      {
        name: "Bistro Na lžíci",
        url: "https://na-lzici.vvitovec27.workers.dev/",
        category: "Restaurace",
        description: "Útulné bistro v srdci Českých Budějovic"
      }
    ];

    /* ════════════════════════════════════════════════════
       BUILD FILTER BUTTONS
       ════════════════════════════════════════════════════ */
    const filtersEl = document.getElementById('filters');
    const categories = ['Vše', ...new Set(projects.map(p => p.category))];

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === 'Vše' ? ' active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => filterProjects(cat, btn));
      filtersEl.appendChild(btn);
    });

    function filterProjects(category, activeBtn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      activeBtn.classList.add('active');

      const cards = document.querySelectorAll('.card');
      cards.forEach((card, i) => {
        const match = category === 'Vše' || card.dataset.category === category;
        card.style.display = match ? '' : 'none';
        if (match) {
          card.style.animationDelay = `${i * 0.08}s`;
        }
      });
    }

    /* ════════════════════════════════════════════════════
       BUILD PROJECT CARDS
       ════════════════════════════════════════════════════ */
    const gridEl = document.getElementById('grid');

    projects.forEach((project, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.category = project.category;
      card.style.animationDelay = `${index * 0.1 + 0.4}s`;

      card.innerHTML = `
        <div class="card-preview">
          <div class="loader"><div class="spinner"></div></div>
          <iframe
            src="${project.url}"
            loading="lazy"
            sandbox="allow-scripts allow-same-origin allow-popups"
            title="${project.name}"
          ></iframe>
        </div>
        <div class="card-info">
          <span class="card-name">${project.name}</span>
          <span class="card-tag">${project.category}</span>
        </div>
        <div class="card-action">
          <span>Prozkoumat web ↗</span>
        </div>
      `;

      // Hide spinner when iframe loads
      const iframe = card.querySelector('iframe');
      const loader = card.querySelector('.loader');
      iframe.addEventListener('load', () => loader.classList.add('hidden'));

      // Open modal on click
      card.addEventListener('click', () => openModal(project));

      gridEl.appendChild(card);
    });

    /* ════════════════════════════════════════════════════
       SCALE IFRAMES TO FIT CARDS
       ════════════════════════════════════════════════════ */
    function scaleIframes() {
      document.querySelectorAll('.card-preview').forEach(container => {
        const scale = container.offsetWidth / 1440;
        const iframe = container.querySelector('iframe');
        if (iframe) {
          iframe.style.transform = `scale(${scale})`;
          // Adjust container height to match scaled iframe
          container.style.height = `${900 * scale}px`;
        }
      });
    }

    scaleIframes();
    window.addEventListener('resize', scaleIframes);

    /* ════════════════════════════════════════════════════
       FULLSCREEN MODAL
       ════════════════════════════════════════════════════ */
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalUrl = document.getElementById('modal-url');
    const modalIframe = document.getElementById('modal-iframe');
    const modalOpen = document.getElementById('modal-open');
    const modalClose = document.getElementById('modal-close');
    const modalLoader = document.getElementById('modal-loader');

    function openModal(project) {
      modalTitle.textContent = project.name;
      modalUrl.textContent = project.url;
      modalOpen.href = project.url;
      modalLoader.classList.remove('hidden');
      modalIframe.src = project.url;
      modalIframe.addEventListener('load', () => {
        modalLoader.classList.add('hidden');
      }, { once: true });
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      // Delay src removal to let transition finish
      setTimeout(() => { modalIframe.src = 'about:blank'; }, 350);
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
